name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clypra

    steps:
      - name: Checkout Clypra
        uses: actions/checkout@v4
        with:
          path: clypra

      - name: Checkout clypra-studio
        uses: actions/checkout@v4
        with:
          repository: AIEraDev/clypra-studio
          path: clypra-studio

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "clypra/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  test-rust:
    name: Test Rust Backend
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install FFmpeg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswscale-dev \
            libswresample-dev \
            libpostproc-dev \
            libclang-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Run Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-frontend, test-rust]
    defaults:
      run:
        working-directory: clypra

    steps:
      - name: Checkout Clypra
        uses: actions/checkout@v4
        with:
          path: clypra

      - name: Checkout clypra-studio
        uses: actions/checkout@v4
        with:
          repository: AIEraDev/clypra-studio
          path: clypra-studio

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "clypra/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check bundle size
        run: |
          if [ -d "dist" ]; then
            echo "Build successful"
            du -sh dist
          else
            echo "Build failed - dist directory not found"
            exit 1
          fi
